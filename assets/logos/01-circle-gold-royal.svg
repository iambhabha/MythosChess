<svg viewBox="0 0 512 512" width="512" height="512" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Mythos logo — iteration 1</title>
<desc>A golden chess knight on a deep royal-blue circular badge with a subtle chessboard background and a gold ring.</desc>
<defs>
