<svg viewBox="0 0 680 210" width="680" height="210" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Mythos logo — color explorations</title>
<desc>The same chess-knight badge shown in amethyst, emerald, teal and crimson-gold color schemes.</desc>
<defs>
<pattern id="bd" width="40" height="40" patternUnits="userSpaceOnUse">
<rect width="20" height="20" fill="#c3cde6" fill-opacity="0.12"/>
<rect x="20" y="20" width="20" height="20" fill="#c3cde6" fill-opacity="0.12"/>
</pattern>
<radialGradient id="vig" cx="50%" cy="50%" r="50%">
<stop offset="60%" stop-color="#000000" stop-opacity="0"/>
<stop offset="100%" stop-color="#000000" stop-opacity="0.8"/>
</radialGradient>
<linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#f8dc7d"/>
<stop offset="50%" stop-color="#c9962f"/>
<stop offset="100%" stop-color="#8a6414"/>
</linearGradient>
<radialGradient id="gA" cx="50%" cy="42%" r="65%"><stop offset="0%" stop-color="#4a2680"/><stop offset="100%" stop-color="#180d32"/></radialGradient>
<radialGradient id="gB" cx="50%" cy="42%" r="65%"><stop offset="0%" stop-color="#0f4a40"/><stop offset="100%" stop-color="#08201c"/></radialGradient>
<radialGradient id="gC" cx="50%" cy="42%" r="65%"><stop offset="0%" stop-color="#123f63"/><stop offset="100%" stop-color="#081a2e"/></radialGradient>
<radialGradient id="gD" cx="50%" cy="42%" r="65%"><stop offset="0%" stop-color="#5e2130"/><stop offset="100%" stop-color="#260b12"/></radialGradient>
<g id="kn" transform="translate(0,0.3)" stroke="#00000077" stroke-width="0.6" stroke-linecap="round" stroke-linejoin="round">
<path d="M 22,10 C 32.5,11 38.5,18 38,39 L 15,39 C 15,30 25,32.5 23,18" fill="currentColor"/>
<path d="M 24,18 C 24.38,20.91 18.45,25.37 16,27 C 13,29 13.18,31.34 11,31 C 9.958,30.06 12.41,27.96 11,28 C 10,28 11.19,29.23 10,30 C 9,30 5.997,31 6,26 C 6,24 12,14 12,14 C 12,14 13.89,12.1 14,10.5 C 13.27,9.506 13.5,8.5 13.5,7.5 C 14.5,6.5 16.5,10 16.5,10 L 18.5,10 C 18.5,10 19.28,8.008 21,7 C 22,7 22,10 22,10" fill="currentColor"/>
<path d="M 9.5 25.5 A 0.5 0.5 0 1 1 8.5,25.5 A 0.5 0.5 0 1 1 9.5 25.5 z" fill="#141414" stroke="#141414"/>
<path d="M 15 15.5 A 0.5 1.5 0 1 1 14,15.5 A 0.5 1.5 0 1 1 15 15.5 z" transform="matrix(0.866,0.5,-0.5,0.866,9.693,-5.173)" fill="#141414" stroke="#141414"/>
</g>
</defs>

<circle cx="100" cy="100" r="70" fill="url(#gA)"/><circle cx="100" cy="100" r="70" fill="url(#bd)"/><circle cx="100" cy="100" r="70" fill="url(#vig)"/>
<g transform="translate(42.8,43.6) scale(2.6)"><use href="#kn" style="color:#b06bff"/></g>
<circle cx="100" cy="100" r="71" fill="none" stroke="#0000005e" stroke-width="3"/><circle cx="100" cy="100" r="69" fill="none" stroke="url(#ring)" stroke-width="5"/>
<text x="100" y="192" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#9c8fb8">Amethyst</text>

<circle cx="270" cy="100" r="70" fill="url(#gB)"/><circle cx="270" cy="100" r="70" fill="url(#bd)"/><circle cx="270" cy="100" r="70" fill="url(#vig)"/>
<g transform="translate(212.8,43.6) scale(2.6)"><use href="#kn" style="color:#2fe0a6"/></g>
<circle cx="270" cy="100" r="71" fill="none" stroke="#0000005e" stroke-width="3"/><circle cx="270" cy="100" r="69" fill="none" stroke="url(#ring)" stroke-width="5"/>
<text x="270" y="192" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#9c8fb8">Emerald</text>

<circle cx="440" cy="100" r="70" fill="url(#gC)"/><circle cx="440" cy="100" r="70" fill="url(#bd)"/><circle cx="440" cy="100" r="70" fill="url(#vig)"/>
<g transform="translate(382.8,43.6) scale(2.6)"><use href="#kn" style="color:#38d0f5"/></g>
<circle cx="440" cy="100" r="71" fill="none" stroke="#0000005e" stroke-width="3"/><circle cx="440" cy="100" r="69" fill="none" stroke="url(#ring)" stroke-width="5"/>
<text x="440" y="192" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#9c8fb8">Teal</text>

<circle cx="610" cy="100" r="70" fill="url(#gD)"/><circle cx="610" cy="100" r="70" fill="url(#bd)"/><circle cx="610" cy="100" r="70" fill="url(#vig)"/>
<g transform="translate(552.8,43.6) scale(2.6)"><use href="#kn" style="color:#f0b93f"/></g>
<circle cx="610" cy="100" r="71" fill="none" stroke="#0000005e" stroke-width="3"/><circle cx="610" cy="100" r="69" fill="none" stroke="url(#ring)" stroke-width="5"/>
<text x="610" y="192" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#9c8fb8">Crimson + gold</text>
